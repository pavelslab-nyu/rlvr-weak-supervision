### model
model_name_or_path: /path/to/Llama-3.2-3B  # or meta-llama/Llama-3.2-3B
trust_remote_code: true
enable_liger_kernel: true

### method
stage: pt
do_train: true
finetuning_type: full
deepspeed: examples/deepspeed/ds_z2_config.json  # path relative to LLaMA-Factory root

### dataset
dataset: nemotron_cc_math_4plus_full  # register in LLaMA-Factory/data/dataset_info.json
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4
cache_dir: /local2/salman/reward_signal_data/hf_cache

### output
output_dir: /path/to/output/llama_3b_cpt_math
logging_steps: 10
save_steps: 5000
save_total_limit: 5
plot_loss: true
overwrite_output_dir: false
save_only_model: false
report_to: mlflow
run_name: llama_3b_cpt_math

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 2.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.01
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
gradient_checkpointing: false
flash_attn: fa2
